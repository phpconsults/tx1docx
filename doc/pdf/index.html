  .excel-logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display:flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin: 0 auto;
    animation: pulse 1s ease-in-out infinite;
  }

  .excel-icon {
    color: rgb(255, 255, 255);
    font-size: 25px;
    font-weight: 700;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

@keyframes pulse {
  0%, 100% {
    transform: scale(1.1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }
  50% {
    transform: scale(1.3);
    box-shadow: 0 8px 30px rgba(99, 33, 3, 0.6);
  }
}

.loading-bar {
  width: 300px;
  height: 2px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  position:absolute;
  top:60%;
}

.progress {
  height: 100%;
  background: linear-gradient(90deg, #742909, #65270d);
  animation: load 1.5s ease-in-out infinite;
}

@keyframes load {
  0% { width: 0%; }
  100% { width: 100%; }
}

.logo{
margin-bottom:5px;
opacity:1;
}
.logo img{
display:block;
margin:0 auto;
height:40px;
width: 40px;
border-radius:5px;
}

.heading2{
text-align:center;
font-size:16px;
font-weight:700;
margin-bottom:3px;
color: #000;
opacity:1;
}

.heading1{
font-size:8px;
color: #000;
margin-bottom:15px;
}

.form{
width:320px;
height:auto;
color: #fff;
font-family: 'roboto', sans-serif;
z-index: 99;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
position: absolute;
top:50%;
left:50%;
transform: translate(-50%, -50%);
padding:10px 15px;
border-radius:5px;
transition: .6s;
background-color: rgba(255, 255, 255, 0);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
animation: fadeIn 0.7s ease-in;
 box-shadow: 
0 15px 35px rgba(60, 54, 54, 0.3),
0 5px 15px rgba(177, 174, 174, 0.2),
inset 0 1px 0 rgba(205, 203, 203, 0.5);
}

@keyframes fadeIn{
0%{opacity:0;}
100%{opacity:1;
}
}

.login-form{
width:100%;
}

.input-group {
      position: relative;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding:5px 8px;
      background-color: #ffffff;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-width:0.5px;
      border-color: #000000;
    }

    label {
      position: absolute;
      left: 10px;
      top: 10px;
      color: #999;
      font-size: 12px;
      pointer-events: none;
      transition: all 0.3s;
    }

    input:focus + label,
    input:not(:placeholder-shown) + label {
      top: -10px;
      left: 10px;
      font-size: 10px;
      color: #050202;
      background: white;
      padding: 0 5px;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
      font-size: 5px;
      user-select: none;
    }

    .eye-open {
      display: inline-block;
    }

    .eye-closed {
      display: none;
    }

    button {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 3px 0px;
      background: linear-gradient(135deg, rgb(179, 11, 0) 0%, rgb(179, 11, 0) 100%);
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 12px;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.2s;
    }

button svg{
height:20px;
color:#fff;
margin-right: 10px;
}

 button:hover{
      transform: translateY(-2px);
  }

button:active {
      transform: translateY(0);
  }

.socials{ 
font-weight:700;
font-size:8px;
display: flex;
justify-content: space-around;
margin:20px auto 0px;
padding:0px 5px;
width:100%;
border:none;
background-color:rgba(255, 255, 255, 0.3);
opacity:1;
}
.socials a{
text-decoration:none;
}
.socials span{
display:flex;
justify-content: center;
align-items: center;
color: #fff;
}
.socials span img{
height:15px;
margin-right: 5px
}

.link{
font-size:0.5rem;
font-weight:600;
opacity:1;
text-align:left;
text-transform: apitalize;
color:#000;
display:block;
margin-top: 20px;
margin-right: 150px;
}
.link:hover{
color: #6f6f6f;
}

.alert{
padding: 0px 0px 20px 0px;
text-align: center;
white-space: nowrap;
width:100%;
color: brown;
font-size: 10px;
font-weight: 600;
}

</style>
